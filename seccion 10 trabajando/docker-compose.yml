version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: geomapa-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - geomapa_db_data:/var/lib/postgresql/data

volumes:
  geomapa_db_data:
